version: '3.7'
services:
  airflow:
    image: apache/airflow:2.8.1-python3.10
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__DAGS_FOLDER=/workspace/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/workspace/airflow/plugins
      - AIRFLOW__CORE__BASE_LOG_FOLDER=/workspace/airflow/logs
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////workspace/airflow/airflow.db
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8080
      - SCRIPTS_DIR=/workspace/scripts
      - DBT_DIR=/workspace/dbt
    volumes:
      - ../airflow/dags:/workspace/airflow/dags
      - ../airflow/plugins:/workspace/airflow/plugins
      - ../airflow/logs:/workspace/airflow/logs
      - ../scripts:/workspace/scripts
      - ../dbt:/workspace/dbt
    ports:
      - "8080:8080"
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver"
